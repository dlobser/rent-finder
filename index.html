<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rent Finder</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .listing { border: 1px solid #ccc; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .filters { margin-bottom: 20px; }
        .filters input, .filters select { margin: 0 10px; padding: 5px; }
    </style>
</head>
<body>
    <h1>Rent Finder - Brooklyn, NY 11215</h1>

    <div class="filters">
        <label>Min Price: <input type="number" id="minPrice" value="2500"></label>
        <label>Max Price: <input type="number" id="maxPrice" value="6500"></label>
        <label>Min Bedrooms: <input type="number" id="minBedrooms" value="0"></label>
        <label>Max Bedrooms: <input type="number" id="maxBedrooms" value="5"></label>
        <button onclick="applyFilters()">Apply Filters</button>
        <button onclick="resetFilters()">Reset</button>
    </div>

    <div id="listings"></div>

    <script>
        let allListings = [];

        async function fetchListings() {
            try {
                const response = await fetch('https://rent-finder-production.up.railway.app/listings');
                allListings = await response.json();
                displayListings(allListings);
            } catch (error) {
                console.error('Error fetching listings:', error);
                document.getElementById('listings').innerHTML = '<p>Error loading listings. Make sure the server is running.</p>';
            }
        }

        function displayListings(listings) {
            const container = document.getElementById('listings');
            container.innerHTML = '';

            if (listings.length === 0) {
                container.innerHTML = '<p>No listings found.</p>';
                return;
            }

            listings.forEach(listing => {
                const div = document.createElement('div');
                div.className = 'listing';
                div.innerHTML = `
                    <h3>${listing.formattedAddress}</h3>
                    <p><strong>Price:</strong> $${listing.price}</p>
                    <p><strong>Bedrooms:</strong> ${listing.bedrooms || 'N/A'} | <strong>Bathrooms:</strong> ${listing.bathrooms || 'N/A'}</p>
                    <p><strong>Type:</strong> ${listing.propertyType || 'N/A'}</p>
                    <p><strong>Listed:</strong> ${new Date(listing.listedDate).toLocaleDateString()}</p>
                    <p><strong>Days on Market:</strong> ${listing.daysOnMarket || 'N/A'}</p>
                `;
                container.appendChild(div);
            });
        }

        function applyFilters() {
            const minPrice = parseInt(document.getElementById('minPrice').value) || 0;
            const maxPrice = parseInt(document.getElementById('maxPrice').value) || Infinity;
            const minBedrooms = parseInt(document.getElementById('minBedrooms').value) || 0;
            const maxBedrooms = parseInt(document.getElementById('maxBedrooms').value) || Infinity;

            const filtered = allListings.filter(listing => {
                return listing.price >= minPrice &&
                       listing.price <= maxPrice &&
                       (listing.bedrooms || 0) >= minBedrooms &&
                       (listing.bedrooms || 0) <= maxBedrooms;
            });

            displayListings(filtered);
        }

        function resetFilters() {
            document.getElementById('minPrice').value = 2500;
            document.getElementById('maxPrice').value = 6500;
            document.getElementById('minBedrooms').value = 0;
            document.getElementById('maxBedrooms').value = 5;
            displayListings(allListings);
        }

        // Load listings on page load
        fetchListings();
    </script>
</body>
</html>
